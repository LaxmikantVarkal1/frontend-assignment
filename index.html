<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta charset="UTF-8" />
    <title>Assignment</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>React Assignment</title>
    <link rel="stylesheet" href="src/styles.css" />
</head>

<body>

  <!-- 1. Calculator -->
  <div class="section">
    <h3>Simple Calculator</h3>
    <input type="number" id="num1" placeholder="Enter number 1">
    <input type="number" id="num2" placeholder="Enter number 2">
    <br>
    <button onclick="addNumbers()">Add</button>
    <p id="result"></p>
  </div>

  <!-- 2. Input Focus -->
  <div id="focusedInput" class="section">
    <h3>User Form</h3>
    <input type="text" placeholder="First Name">
    <input type="text" placeholder="Last Name">
  </div>

  <!-- 3. Image Hover -->
  <div class="section">
    <h3>Image Hover Scale</h3>
    <div class="image-container">
      <img src="./image.png" alt="Sample Image">
    </div>
  </div>

  <script>
    // 1. Calculator Function
    function addNumbers() {
      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);

      const sum = num1 + num2;
      document.getElementById("result").innerText = "Result: " + sum;
    }

    // 4. Async Function with Validation
    async function addAsync(a, b) {
      return new Promise((resolve, reject) => {
        if (typeof a !== "number" || typeof b !== "number") {
          reject("Invalid input: both arguments must be numbers");
        } else {
          resolve(a + b);
        }
      });
    }

    // Call with valid input
    addAsync(5, 10)
      .then(result => console.log("Valid Result:", result))
      .catch(err => console.error(err));

    // Call with invalid input
    addAsync(5, "abc")
      .then(result => console.log(result))
      .catch(err => console.error("Error:", err));

  </script>

</body>
</html>
